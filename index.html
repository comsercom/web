    <style>
        /* ==========================================================================
           VARIABLES DE DISEÑO Y PALETA CORPORATIVA AVANZADA
           ========================================================================== */
        :root {
            --bg-principal: #060608;
            --bg-secundario: #0d0d11;
            --bg-tarjeta: #131318;
            --primario-neon: #00E5FF; /* Cyan Ciberborde */
            --secundario-tech: #7000FF; /* Violeta Cuántico */
            --acentos: #FFD400; /* Amarillo Alerta de Precisión */
            --borde-tech: #222228;
            --texto-claro: #E4E4E9;
            --texto-oscuro: #8F8F9D;
            --sidebar-width: 260px;
            --header-height: 65px;
            --subnav-height: 50px;
            --transicion: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==========================================================================
           RESETEO GENERAL Y ENFOQUE FIRST-MOBILE
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            font-size: 13px; /* Tipografía base compacta para Mobile-First */
            line-height: 1.5;
            overflow-x: hidden;
            width: 100%;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        button { border: none; background: none; cursor: pointer; font-family: inherit; }

        /* ==========================================================================
           HEADER SUPERIOR FIJO
           ========================================================================== */
        .top-header {
            height: var(--header-height);
            background: rgba(6, 6, 8, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--borde-tech);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Hamburguesa posicionada a la izquierda junto al logo en móvil */
        .menu-toggle {
            color: var(--primario-neon);
            font-size: 22px;
            padding: 5px;
            display: block;
        }

        .logo-text {
            font-weight: 800;
            font-size: 17px;
            color: #fff;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .logo-text span { color: var(--primario-neon); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Botón de idioma */
        .lang-toggle {
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid var(--borde-tech);
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--bg-secundario);
            transition: var(--transicion);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .lang-toggle:hover {
            border-color: var(--primario-neon);
            color: var(--primario-neon);
        }

        /* ==========================================================================
           NAVEGACIÓN DE SUBDOMINIOS HORIZONTAL (SIN EXTENSIÓN)
           ========================================================================== */
        .subnav {
            position: fixed;
            top: var(--header-height);
            width: 100%;
            height: var(--subnav-height);
            background: var(--bg-secundario);
            border-bottom: 1px solid var(--borde-tech);
            display: flex;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
            padding: 0 10px;
            z-index: 999;
            scrollbar-width: none; 
        }
        .subnav::-webkit-scrollbar { display: none; }

        .subnav a {
            color: var(--texto-oscuro);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 8px 14px;
            margin-right: 4px;
            border-radius: 5px;
            transition: var(--transicion);
        }
        .subnav a.active, .subnav a:hover {
            color: var(--primario-neon);
            background: rgba(0, 229, 255, 0.08);
        }

        /* ==========================================================================
           ESTRUCTURA WRAPPER Y SIDEBAR ALINEADO A LA IZQUIERDA
           ========================================================================== */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            margin-top: calc(var(--header-height) + var(--subnav-height));
            flex: 1;
            position: relative;
            width: 100%;
        }

        /* Menú lateral vertical: Alineado a la izquierda */
        .sidebar {
            position: fixed;
            left: -100%; /* Totalmente fuera de pantalla en móvil por defecto */
            top: calc(var(--header-height) + var(--subnav-height));
            width: var(--sidebar-width);
            height: calc(100vh - var(--header-height) - var(--subnav-height));
            background: #09090c;
            border-right: 1px solid var(--borde-tech);
            overflow-y: auto;
            transition: var(--transicion);
            z-index: 998;
            display: flex;
            flex-direction: column;
        }

        /* Activación limpia del menú lateral izquierdo */
        .sidebar.active { left: 0; }

        /* Capa oscura protectora de fondo para interacción móvil */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 997;
            backdrop-filter: blur(4px);
        }
        .sidebar-overlay.active { display: block; }

        .sidebar-title {
            padding: 18px 15px 10px;
            font-size: 10px;
            color: var(--texto-oscuro);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--borde-tech);
        }

        .menu-links li a {
            padding: 14px 18px;
            color: var(--texto-oscuro);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            border-bottom: 1px solid #121216;
            transition: var(--transicion);
        }
        .menu-links li a:hover, 
        .menu-links li a.active {
            color: #fff;
            background: linear-gradient(90deg, rgba(112, 0, 255, 0.12), transparent);
            border-left: 4px solid var(--primario-neon);
        }

        /* ==========================================================================
           ÁREA DE CONTENIDO DINÁMICO
           ========================================================================== */
        .content-area {
            flex: 1;
            padding: 16px;
            width: 100%;
            animation: vistaEntrada 0.4s ease-out;
        }

        @keyframes vistaEntrada {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hero banner estilizado */
        .hero-banner {
            width: 100%;
            min-height: 160px;
            background: linear-gradient(135deg, var(--bg-secundario) 0%, #050507 100%);
            border-radius: 10px;
            border: 1px solid var(--borde-tech);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .hero-banner::before {
            content: ""; position: absolute; top: -50%; right: -50%; width: 150%; height: 150%;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.08) 0%, transparent 65%);
            z-index: 1;
        }
        .hero-text { position: relative; z-index: 2; width: 100%; }
        .hero-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 10px; line-height: 1.3; }
        .hero-desc { font-size: 12px; color: var(--texto-claro); line-height: 1.6; }
        
        .badge-div {
            display: inline-block; padding: 3px 8px; font-size: 9px;
            background: rgba(0, 229, 255, 0.08); color: var(--primario-neon);
            border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 4px;
            margin-bottom: 8px; font-weight: 700; letter-spacing: 0.8px;
        }

        /* Tarjeta estática base */
        .main-card {
            background: var(--bg-tarjeta);
            border: 1px solid var(--borde-tech);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
        }

        /* ==========================================================================
           SISTEMA DE BANNERS TEMÁTICOS COMERCIALES DINÁMICOS
           ========================================================================== */
        .commercial-grid {
            display: grid;
            grid-template-columns: 1fr; /* Apilados por defecto en Mobile First */
            gap: 16px;
            margin-top: 20px;
        }

        .banner-item {
            background: #15151c;
            border: 1px solid var(--borde-tech);
            border-radius: 8px;
            overflow: hidden;
            transition: var(--transicion);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .banner-item:hover {
            transform: translateY(-4px);
            border-color: var(--primario-neon);
            box-shadow: 0 8px 24px rgba(0, 229, 255, 0.05);
        }

        .banner-media-box {
            width: 100%;
            height: 130px; /* Tamaño móvil controlado */
            position: relative;
            background: #09090c;
            overflow: hidden;
        }
        .banner-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: var(--transicion);
            filter: brightness(0.85);
        }
        .banner-item:hover .banner-img { transform: scale(1.04); filter: brightness(1); }

        .offer-tag {
            position: absolute; top: 10px; left: 10px;
            background: var(--secundario-tech); color: #fff;
            padding: 2px 8px; font-size: 9px; font-weight: 700;
            border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .banner-info { padding: 14px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .banner-h3 { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 6px; }
        .banner-p { font-size: 11px; color: var(--texto-oscuro); line-height: 1.4; }

        /* Elemento interactivo de multimedia simulada */
        .media-action-bar {
            margin-top: 10px; padding-top: 8px; border-top: 1px solid #1d1d26;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 10px; color: var(--primario-neon); font-weight: 500;
        }

        /* ==========================================================================
           MEDIA QUERIES - OPTIMIZACIÓN Y CONTROL COMPLETO DE VERSIÓN PC
           ========================================================================== */
        @media (min-width: 992px) {
            html, body { font-size: 14px; }

            /* Re-organización estructural en PC: Sidebar fijo a la izquierda */
            .main-wrapper {
                flex-direction: row;
            }

            .sidebar {
                left: 0; right: auto;
                position: fixed;
                width: var(--sidebar-width);
                background: var(--bg-secundario);
                border-right: 1px solid var(--borde-tech);
                border-left: none;
            }

            .content-area {
                margin-left: var(--sidebar-width); /* Deja espacio para el menú lateral izquierdo */
                margin-right: 0;
                padding: 35px 40px;
            }

            /* Corrección del vacío visual en PC: Grid comercial de 3 columnas perfectas */
            .commercial-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }

            .banner-media-box {
                height: 160px; /* Banners más inmersivos y altos en PC */
            }

            .hero-title { font-size: 26px; }
            .hero-desc { font-size: 14px; }
            
            /* Ocultar botón disparador de menú en versión escritorio */
            .menu-toggle { display: none; }
        }
    </style>
</head>

        const listSubdomains = ['edgecom', 'aidomot', 'forensic', 'owncode', 'support'];

        /**
         * INICIALIZADOR DE LA APLICACIÓN
         */
        document.addEventListener('DOMContentLoaded', () => {
            renderSubnav();
            loadContent('home', 'main');
        });

        /**
         * INTERRUPTOR DE IDIOMA (Alterna ES/EN dinámicamente)
         */
        function toggleLanguage() {
            appState.lang = appState.lang === 'es' ? 'en' : 'es';
            document.getElementById('lang-text').innerText = appState.lang.toUpperCase();
            
            // Re-renderizado total sin parpadeos ni recargas completas
            renderSubnav(); 
            loadContent(appState.currentSub, appState.currentLink);
        }

        /**
         * MANIPULADOR DEL MENÚ LATERAL MÓVIL (Alineado a la izquierda)
         */
        function toggleMobileMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        }

        function closeMobileMenu() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('sidebar-overlay').classList.remove('active');
        }

        /**
         * RENDERIZADOR DE ENLACES DE SUBDOMINIO (Limpiados de la extensión .comsercom.com)
         */
        function renderSubnav() {
            const container = document.getElementById('subnav-container');
            container.innerHTML = ''; 
            
            listSubdomains.forEach(sub => {
                const a = document.createElement('a');
                a.href = "#";
                a.innerText = siteData[sub].cleanName || sub;
                a.className = appState.currentSub === sub ? 'active' : '';
                
                a.onclick = (e) => {
                    e.preventDefault();
                    loadContent(sub, 'main');
                    Array.from(container.children).forEach(child => child.classList.remove('active'));
                    a.classList.add('active');
                };
                container.appendChild(a);
            });
        }

        /**
         * MOTOR DE NAVEGACIÓN SINGLE PAGE (SPA) - CARGA DINÁMICA DE CONTENIDOS
         */
        function loadContent(sub, linkId) {
            appState.currentSub = sub;
            appState.currentLink = linkId;
            const lg = appState.lang;
            const data = siteData[sub];

            // 1. Orquestación y actualización del menú lateral vertical (Izquierda)
            const sidebarMenu = document.getElementById('sidebar-menu');
            const sidebarTitle = document.getElementById('sidebar-title');
            
            if (sub === 'home') {
                sidebarTitle.innerText = lg === 'es' ? "PANEL PRINCIPAL" : "MAIN DASHBOARD";
                sidebarMenu.innerHTML = `
                    <li><a href="#" class="active" onclick="closeMobileMenu(); event.preventDefault();"><i class="fa-solid fa-house"></i> Overview</a></li>
                `;
                Array.from(document.getElementById('subnav-container').children).forEach(c => c.classList.remove('active'));
            } else {
                sidebarTitle.innerText = lg === 'es' ? "ESPECIALIDADES" : "SPECIALTIES";
                let linksHTML = `
                    <li>
                        <a href="#" class="${linkId === 'main' ? 'active' : ''}" onclick="loadContent('${sub}', 'main'); event.preventDefault();">
                            <i class="fa-solid fa-layer-group"></i> ${lg === 'es' ? 'Resumen División' : 'Division Summary'}
                        </a>
                    </li>
                `;
                data.links.forEach(l => {
                    const isActive = linkId === l.id ? 'active' : '';
                    linksHTML += `
                        <li>
                            <a href="#" class="${isActive}" onclick="loadContent('${sub}', '${l.id}'); event.preventDefault();">
                                <i class="fa-solid ${l.icon}"></i> ${l.title[lg]}
                            </a>
                        </li>
                    `;
                });
                sidebarMenu.innerHTML = linksHTML;
            }

            // 2. Construcción del Layout de Contenido
            const mainContent = document.getElementById('main-content');
            let htmlContent = '';

            if (linkId === 'main') {
                // Vista del Resumen Principal de la división o Home
                htmlContent = `
                    <div class="hero-banner">
                        <div class="hero-text">
                            <span class="badge-div"><i class="fa-solid ${data.icon}"></i> ${sub === 'home' ? 'COMSERCOM' : data.cleanName.toUpperCase()}</span>
                            <h1 class="hero-title">${sub === 'home' ? data.title[lg] : (lg === 'es' ? 'Soberanía Lógica de la Información' : 'Logical Information Sovereignty')}</h1>
                            <p class="hero-desc">${sub === 'home' ? data.content[lg] : data.summary[lg]}</p>
                        </div>
                    </div>
                `;
            } else {
                // Vista de un enlace interno o Especialidad específica
                const linkData = data.links.find(l => l.id === linkId);
                htmlContent = `
                    <div class="main-card">
                        <span class="badge-div"><i class="fa-solid ${data.icon}"></i> ${data.cleanName.toUpperCase()}</span>
                        <h2 class="hero-title" style="margin-top:8px; color: var(--primario-neon);"><i class="fa-solid ${linkData.icon}"></i> ${linkData.title[lg]}</h2>
                        <p class="hero-desc" style="color: var(--texto-claro); margin-top:12px; font-size:13px;">${linkData.content[lg]}</p>
                    </div>
                `;
            }

            // Inyección Dinámica obligatoria de los 3 Banners Comerciales/Temáticos para rellenar la versión PC
            htmlContent += `
                <h3 style="font-size:12px; color: var(--acentos); text-transform:uppercase; letter-spacing:1px; margin-top:10px;">
                    <i class="fa-solid fa-bolt mr-2"></i> ${lg === 'es' ? 'Soluciones Destacadas & Ofertas Corporativas' : 'Featured Solutions & Corporate Offers'}
                </h3>
                <div class="commercial-grid">
            `;

            // Obtenemos los banners correspondientes (si es un sub-enlace usa los de su subdominio base para mantener ofertas robustas)
            const currentBanners = data.banners || siteData['home'].banners;

            currentBanners.forEach((b, index) => {
                htmlContent += `
                    <div class="banner-item">
                        <div class="banner-media-box">
                            <img src="${b.img}" class="banner-img" alt="COMSERCOM Tech">
                            <span class="offer-tag">${b.offer[lg]}</span>
                        </div>
                        <div class="banner-info">
                            <div>
                                <h4 class="banner-h3">${b.title[lg]}</h4>
                                <p class="banner-p">${b.desc[lg]}</p>
                            </div>
                            <div class="media-action-bar">
                                <span><i class="fa-solid fa-play-circle"></i> Interactive Demo</span>
                                <i class="fa-solid fa-volume-high"></i>
                            </div>
                        </div>
                    </div>
                `;
            });

            htmlContent += `</div>`;

            // Si es la página de inicio, agregamos accesos directos dinámicos en formato mosaico comercial
            if (sub === 'home') {
                htmlContent += `
                    <h3 style="font-size:12px; color: #fff; text-transform:uppercase; letter-spacing:1px; margin-top:30px; border-bottom: 1px solid var(--borde-tech); padding-bottom:8px;">
                        ${lg === 'es' ? 'Nuestras Divisiones Operativas' : 'Our Operational Divisions'}
                    </h3>
                    <div class="commercial-grid" style="margin-top:15px;">
                `;
                listSubdomains.forEach(s => {
                    htmlContent += `
                        <div class="main-card" style="margin-bottom:0; cursor:pointer; border-left: 3px solid var(--secundario-tech);" onclick="loadContent('${s}', 'main')">
                            <h4 style="color: var(--primario-neon); font-size:14px; margin-bottom:6px;"><i class="fa-solid ${siteData[s].icon}"></i> ${siteData[s].cleanName.toUpperCase()}</h4>
                            <p style="font-size:11px; color: var(--texto-oscuro); line-height:1.4;">${siteData[s].summary[lg].substring(0, 95)}...</p>
                        </div>
                    `;
                });
                htmlContent += `</div>`;
            }

            // Inyectar el HTML construido y cerrar el menú móvil para evitar bloqueos de pantalla
            mainContent.innerHTML = htmlContent;
            closeMobileMenu();
        }
    </script>
